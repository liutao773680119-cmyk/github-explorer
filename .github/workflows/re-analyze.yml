name: Re-analyze Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: '项目全名 (owner/repo)'
        required: true
        type: string
      provider:
        description: 'AI provider（gemini / deepseek / openai / openrouter）'
        required: false
        default: 'gemini'
        type: string
      model:
        description: '可选：覆盖默认模型名'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  re-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AI_PROVIDER: ${{ github.event.inputs.provider || 'gemini' }}
      AI_MODEL: ${{ github.event.inputs.model }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Re-analyze project
        run: npx tsx scripts/re-analyze.ts "${{ github.event.inputs.project }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: re-analyze ${{ github.event.inputs.project }}"
          git push
