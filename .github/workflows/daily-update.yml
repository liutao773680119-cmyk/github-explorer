name: Daily Update

on:
  schedule:
    - cron: '30 1 * * *' # UTC 01:30 = 北京 09:30
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AI_PROVIDER: deepseek
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VERTEX_GEMINI_PROJECT: ${{ secrets.VERTEX_GEMINI_PROJECT }}
      VERTEX_GEMINI_LOCATION: ${{ vars.VERTEX_GEMINI_LOCATION || 'us-central1' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        if: env.AI_PROVIDER == 'vertex-gemini'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_VERTEX_SERVICE_ACCOUNT_JSON }}

      - run: npm ci

      - name: Run fetch-and-analyze
        run: npx tsx scripts/fetch-and-analyze.ts

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

      # Keep-alive: 每月30号空 commit 防止 Actions 60天不活跃被暂停
      - name: Keep-alive ping
        if: github.event_name == 'schedule'
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "30" ]; then
            git commit --allow-empty -m "chore: keep-alive ping"
            git push
          fi
