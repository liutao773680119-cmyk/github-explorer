name: Daily Update

on:
  schedule:
    - cron: '30 1 * * *' # UTC 01:30 = 北京 09:30
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run fetch-and-analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/fetch-and-analyze.ts

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

      # Keep-alive: 每月30号空 commit 防止 Actions 60天不活跃被暂停
      - name: Keep-alive ping
        if: ${{ github.event.schedule && (new Date()).getDate() == 30 }}
        run: |
          git commit --allow-empty -m "chore: keep-alive ping"
          git push
