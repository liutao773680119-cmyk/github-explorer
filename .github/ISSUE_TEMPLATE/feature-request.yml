name: Feature request
description: Propose an improvement to discovery quality, data pipelines, or maintainer workflows.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What maintainer or user problem is not handled well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the simplest version of the improvement.
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: Expected benefit
      description: Why is this worth the maintenance cost?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. List alternatives or related tools/workflows.
