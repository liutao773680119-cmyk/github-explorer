name: Bug report
description: Report a reproducible bug in the app, scripts, workflows, or generated data behavior.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Example: UI, daily-update workflow, re-analyze workflow, data pipeline
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, workflow links, or screenshots if available.
